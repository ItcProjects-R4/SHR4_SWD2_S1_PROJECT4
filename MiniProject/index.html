<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Profile Card with ColorHunt Palette</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div data-aos="fade-up" data-aos-duration="3000">
        <div class="profile-card" id="profileCard">
          <header class="profile-header">
            <div class="img-container">
              <img
                src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?q=80&w=150&auto=format&fit=crop"
                alt="Profile of Jaden Miles"
              />
            </div>
            <h1 class="profile-name">Jaden Miles</h1>
            <p class="profile-tag">Creative Director & Visual Storyteller</p>
            <div class="divider"></div>
            <p class="profile-bio">
              Crafting compelling visual narratives for brands. Minimalist
              approach with maximal impact. Coffee enthusiast.
            </p>
          </header>

          <section class="social-section">
            <a href="#" class="icon" title="LinkedIn"
              ><i class="fab fa-linkedin-in"></i
            ></a>
            <a href="#" class="icon" title="Dribbble"
              ><i class="fab fa-dribbble"></i
            ></a>
            <a href="#" class="icon" title="GitHub"
              ><i class="fab fa-github"></i
            ></a>
            <a href="#" class="icon" title="Twitter"
              ><i class="fab fa-twitter"></i
            ></a>
          </section>

          <footer class="card-action">
            <button class="btn">Change Mood</button>
          </footer>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script src="index.js"></script>
  </body>
</html>
